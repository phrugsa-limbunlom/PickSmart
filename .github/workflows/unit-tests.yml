name: Unit Tests

on:
  pull_request:
    branches:
      - "**"

jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chatbot-server
    env:
      GROQ_API_KEY: "test"
      TAVILY_API_KEY: "test"
      COHERE_API_KEY: "test"
      MONGO_DB_USERNAME: "test"
      MONGO_DB_PASSWORD: "test"
      MONGO_DB_CLUSTER: "test"
      MONGO_DB_NAME: "test"
      CORS_ORIGINS: "http://localhost:3000"
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest
